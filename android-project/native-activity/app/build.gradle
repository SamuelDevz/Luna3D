plugins {
    alias(libs.plugins.android.application)
}

android {
    namespace 'com.example.native_activity'
    compileSdk 35

    defaultConfig {
        applicationId = 'com.example.native_activity'
        minSdkVersion 24
        targetSdk 35
        versionCode 1
        versionName "1.0"

        externalNativeBuild {
            cmake {
                version "4.1.0"
                arguments '-DANDROID_STL=c++_static'
            }
        }
    }

    externalNativeBuild {
        cmake {
            path 'src/main/cpp/CMakeLists.txt'
        }
    }
}
